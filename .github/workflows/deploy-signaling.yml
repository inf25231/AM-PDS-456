name: Deploy Server
run-name: Deploy from ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/signaling-server/**' # trigger only when files in signaling server root change
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-signaling.yml'

concurrency:
  group: deploy-signaling-production
  cancel-in-progress: true

jobs:
  validate:
    name: Validate before deploy
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to production
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to Oracle
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            REPO_DIR="$HOME/AM-PDS-456"
            APP_DIR="$REPO_DIR/apps/signaling-server"

            echo "::group::Deploy"
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
            corepack pnpm --filter signaling-server install --frozen-lockfile --prod

            cd "$APP_DIR"

            cat > .env << 'EOF'
            PORT=${{ secrets.PORT }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            EOF

            if pm2 describe signaling >/dev/null 2>&1; then
              pm2 restart signaling --update-env
            else
              pm2 start src/index.js --name signaling
            fi
            pm2 save
            echo "::endgroup::"

            echo "::group::Health check"
            if ! curl --fail --silent --show-error --retry 10 --retry-delay 1 --retry-connrefused \
              "http://127.0.0.1:${{ secrets.PORT }}/health"; then
              pm2 logs signaling --lines 100 --nostream
              exit 1
            fi
            echo "::endgroup::"

            echo "::group::PM2 status"
            pm2 status
            echo "::endgroup::"
