name: Deploy Server
run-name: Deploy from ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
        - main
    paths:
      - 'apps/signaling-server/**'  # trigger only when files in signaling server root change
      - '.github/workflows/deploy-signaling.yml'

concurrency:
  group: deploy-signaling-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to Oracle
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            APP_DIR="$HOME/AM-PDS-456/apps/signaling-server"

            echo "::group::Deploy"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            if [ -f package-lock.json ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi

            cat > .env << 'EOF'
            PORT=${{ secrets.PORT }}
            LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
            LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
            LIVEKIT_URL=${{ secrets.LIVEKIT_URL }}
            EOF
            
            if pm2 describe signaling >/dev/null 2>&1; then
              pm2 restart signaling --update-env
            else
              pm2 start src/index.js --name signaling
            fi
            pm2 save
            echo "::endgroup::"

            echo "::group::PM2 status"
            pm2 status
            echo "::endgroup::"