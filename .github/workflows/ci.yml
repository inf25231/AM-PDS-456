name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Check, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Check types
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test signaling server
        run: pnpm --filter signaling-server test

      - name: Test web app helpers
        run: pnpm --filter web-app test

      - name: Build web app
        run: pnpm web:build
